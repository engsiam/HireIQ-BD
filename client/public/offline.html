<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline - HireIQ BD</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#EB4C4C">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #EB4C4C;
      --primary-dark: #c43a3a;
      --bg-dark: #0B1120;
      --bg-card: #1E293B;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.5);
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #162033 50%, var(--bg-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(235, 76, 76, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(235, 76, 76, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      max-width: 600px;
      padding: 40px 24px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* Icon */
    .icon-wrapper {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 32px;
    }

    .icon-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(235, 76, 76, 0.2), rgba(235, 76, 76, 0.05));
      border-radius: 50%;
      animation: pulse 3s ease-in-out infinite;
    }

    .icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(235, 76, 76, 0.3);
      animation: float 4s ease-in-out infinite;
    }

    .icon svg {
      width: 36px;
      height: 36px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -50%); }
      50% { transform: translate(-50%, -55%); }
    }

    /* Badge */
    .badge {
      position: absolute;
      bottom: -10px;
      right: -10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    /* Typography */
    h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.9) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 8px 24px rgba(235, 76, 76, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(235, 76, 76, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Cached Pages */
    .cached-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .cached-section h2 {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .cached-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .cached-link {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 16px;
      border-radius: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .cached-link:hover {
      background: rgba(235, 76, 76, 0.1);
      color: var(--primary);
      border-color: rgba(235, 76, 76, 0.3);
    }

    .no-cache {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    /* Logo in footer */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      justify-content: center;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
    }

    .logo-text span {
      color: var(--primary);
    }

    @media (max-width: 480px) {
      h1 { font-size: 28px; }
      .description { font-size: 15px; }
      .btn { padding: 12px 20px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <div class="icon-bg"></div>
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
        </svg>
      </div>
      <div class="badge">Offline</div>
    </div>

    <h1>You're Offline</h1>
    <p class="description">
      It looks like you've lost your internet connection. Don't worry — you can still access some of your previously visited pages, or try connecting again.
    </p>

    <div class="actions">
      <button class="btn btn-primary" onclick="window.location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        Try Again
      </button>
      <button class="btn btn-secondary" onclick="window.history.back()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Go Back
      </button>
    </div>

    <div class="divider">
      <span>Available Offline</span>
    </div>

    <div class="cached-section">
      <h2>Cached Pages</h2>
      <div class="cached-list" id="cachedPages">
        <span class="no-cache">Loading available pages...</span>
      </div>
    </div>

    <div class="footer">
      <div class="logo">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
        </div>
        <span class="logo-text">Hire<span>IQ</span> BD</span>
      </div>
      <p>AI-Powered Job Platform</p>
    </div>
  </div>

  <script>
    const VALID_PAGES = [
      { path: '/jobs', name: 'Find Jobs' },
      { path: '/blog', name: 'Blog' },
      { path: '/about', name: 'About Us' },
      { path: '/contact', name: 'Contact' },
      { path: '/login', name: 'Login' },
      { path: '/register', name: 'Sign Up' },
      { path: '/ai-tools', name: 'AI Tools' },
    ];

    function getDisplayName(pathname) {
      const cleanPath = pathname.replace(/\/$/, '');
      const match = VALID_PAGES.find(p => p.path === cleanPath || cleanPath.startsWith(p.path + '/'));
      return match ? match.name : null;
    }

    if ('caches' in window) {
      const links = [];
      caches.keys().then(names => {
        Promise.all(names.map(name => 
          caches.open(name).then(cache => 
            cache.keys().then(requests => requests.map(req => req.url))
          )
        )).then(results => {
          const seen = new Set();
          results.flat().forEach(url => {
            try {
              const u = new URL(url);
              if (u.origin === location.origin) {
                const name = getDisplayName(u.pathname);
                if (name && !seen.has(name)) {
                  seen.add(name);
                  links.push(`<a href="${u.pathname}" class="cached-link">${name}</a>`);
                }
              }
            } catch(e) {}
          });
          
          const container = document.getElementById('cachedPages');
          if (links.length > 0) {
            container.innerHTML = links.join('');
          } else {
            container.innerHTML = '<span class="no-cache">No pages available offline.<br>Connect to the internet.</span>';
          }
        });
      });
    } else {
      document.getElementById('cachedPages').innerHTML = '<span class="no-cache">Cache not available</span>';
    }
  </script>
</body>
</html>
